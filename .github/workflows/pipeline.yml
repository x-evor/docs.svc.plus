name: docs.svc.plus Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pipeline.yml"
      - ".github/workflows/build-push-ghcr-image.yml"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "README.md"
      - "cmd/**"
      - "deploy/single-node/**"
      - "internal/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pipeline.yml"
      - ".github/workflows/build-push-ghcr-image.yml"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "README.md"
      - "cmd/**"
      - "deploy/single-node/**"
      - "internal/**"
  workflow_dispatch:
    inputs:
      target_host:
        description: Ansible host or alias
        required: false
        default: "jp-xhttp-contabo.svc.plus"
        type: string
      run_apply:
        description: Apply deployment
        required: true
        default: true
        type: boolean
      sync_dns:
        description: Sync Cloudflare DNS after deploy
        required: true
        default: false
        type: boolean
      knowledge_repo_path_host:
        description: Absolute knowledge repo path on the target host
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docs-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  DEFAULT_TARGET_HOST: jp-xhttp-contabo.svc.plus
  DEFAULT_DOCS_CANONICAL_DOMAIN: docs.svc.plus

jobs:
  prep:
    name: Prep
    runs-on: ubuntu-latest
    outputs:
      target_host: ${{ steps.flags.outputs.target_host }}
      run_apply: ${{ steps.flags.outputs.run_apply }}
      deploy_enabled: ${{ steps.flags.outputs.deploy_enabled }}
      push_image: ${{ steps.flags.outputs.push_image }}
      sync_dns: ${{ steps.flags.outputs.sync_dns }}
      knowledge_repo_path_host: ${{ steps.flags.outputs.knowledge_repo_path_host }}
    steps:
      - name: Resolve pipeline flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_TARGET_HOST: ${{ env.DEFAULT_TARGET_HOST }}
          DEFAULT_KNOWLEDGE_REPO_PATH_HOST: ${{ vars.DOCS_KNOWLEDGE_REPO_PATH_HOST }}
          INPUT_TARGET_HOST: ${{ inputs.target_host }}
          INPUT_RUN_APPLY: ${{ inputs.run_apply }}
          INPUT_SYNC_DNS: ${{ inputs.sync_dns }}
          INPUT_KNOWLEDGE_REPO_PATH_HOST: ${{ inputs.knowledge_repo_path_host }}
        run: |
          set -euo pipefail

          target_host="${INPUT_TARGET_HOST:-}"
          if [[ -z "${target_host}" ]]; then
            target_host="${DEFAULT_TARGET_HOST}"
          fi

          knowledge_repo_path_host="${INPUT_KNOWLEDGE_REPO_PATH_HOST:-}"
          if [[ -z "${knowledge_repo_path_host}" ]]; then
            knowledge_repo_path_host="${DEFAULT_KNOWLEDGE_REPO_PATH_HOST:-}"
          fi

          case "${EVENT_NAME}" in
            pull_request)
              run_apply="false"
              deploy_enabled="false"
              push_image="false"
              sync_dns="false"
              ;;
            push)
              run_apply="true"
              deploy_enabled="true"
              push_image="true"
              sync_dns="false"
              ;;
            workflow_dispatch)
              run_apply="${INPUT_RUN_APPLY:-true}"
              deploy_enabled="true"
              push_image="true"
              sync_dns="${INPUT_SYNC_DNS:-false}"
              ;;
            *)
              run_apply="false"
              deploy_enabled="false"
              push_image="false"
              sync_dns="false"
              ;;
          esac

          {
            echo "target_host=${target_host}"
            echo "run_apply=${run_apply}"
            echo "deploy_enabled=${deploy_enabled}"
            echo "push_image=${push_image}"
            echo "sync_dns=${sync_dns}"
            echo "knowledge_repo_path_host=${knowledge_repo_path_host}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: prep
    runs-on: ubuntu-latest
    env:
      SERVICE_REGISTRY: ghcr.io
      SERVICE_IMAGE_REPO_OWNER: ${{ vars.IMAGE_REPO_OWNER || github.repository_owner }}
      SERVICE_IMAGE_NAME: docs
    outputs:
      service_image_repo: ${{ steps.service_image.outputs.repo }}
      service_image_ref: ${{ steps.service_ref.outputs.image_ref }}
      service_image_tag: ${{ steps.service_ref.outputs.image_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        if: needs.prep.outputs.push_image == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Resolve service image repository
        id: service_image
        run: echo "repo=${SERVICE_REGISTRY}/${SERVICE_IMAGE_REPO_OWNER}/${SERVICE_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute service image tags
        id: service_meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ steps.service_image.outputs.repo }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Resolve service image ref
        id: service_ref
        run: |
          set -euo pipefail

          tags_raw="${{ steps.service_meta.outputs.tags }}"
          image_ref="$(printf '%s\n' "${tags_raw}" | tr ',' '\n' | sed '/^$/d' | grep -E ':sha-[0-9a-f]{40}$|:[0-9a-f]{40}$' | head -n 1)"

          if [[ -z "${image_ref}" ]]; then
            echo "failed to resolve image ref from metadata tags" >&2
            exit 1
          fi

          image_no_digest="${image_ref%@*}"
          image_tag="${image_no_digest##*:}"

          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push service image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ needs.prep.outputs.push_image == 'true' }}
          tags: ${{ steps.service_meta.outputs.tags }}
          labels: ${{ steps.service_meta.outputs.labels }}

  deploy:
    name: Deploy
    needs:
      - prep
      - build
    if: ${{ needs.prep.outputs.deploy_enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check out playbooks repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: x-evor/playbooks
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: playbooks

      - name: Guard against host image builds
        working-directory: ${{ github.workspace }}/playbooks
        run: |
          set -euo pipefail

          if grep -REn \
            -e 'docker build' \
            -e 'podman build' \
            -e 'docker buildx build' \
            -e 'gcloud builds submit' \
            deploy_docs_svc_plus.yml roles/vhosts/docs_service \
            ; then
            echo "docs deploy flow must use the build job image artifact and must not build images on the target host" >&2
            exit 1
          fi

      - name: Guard deploy image contract
        working-directory: ${{ github.workspace }}/playbooks
        run: |
          set -euo pipefail

          grep -REn "lookup\\('ansible.builtin.env', 'DOCS_IMAGE_REF'\\)" \
            deploy_docs_svc_plus.yml >/dev/null
          grep -REn '^IMAGE=\{\{ docs_service_image_ref \}\}$' \
            roles/vhosts/docs_service/templates/env.runtime.j2 >/dev/null
          grep -REn 'image: \$\{IMAGE:\?set IMAGE in \.env\.runtime\}' \
            roles/vhosts/docs_service/templates/docker-compose.yml.j2 >/dev/null

      - name: Assert knowledge repo path is configured
        env:
          KNOWLEDGE_REPO_PATH_HOST: ${{ needs.prep.outputs.knowledge_repo_path_host }}
        run: |
          set -euo pipefail
          if [[ -z "${KNOWLEDGE_REPO_PATH_HOST}" ]]; then
            echo "knowledge repo path is required. Set repository variable DOCS_KNOWLEDGE_REPO_PATH_HOST or provide workflow_dispatch input knowledge_repo_path_host." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.11"

      - name: Install Ansible runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core==2.18.3"

      - name: Prepare runner SSH access
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${SINGLE_NODE_VPS_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa"
          chmod 600 "${HOME}/.ssh/id_rsa"

      - name: Run docs deploy playbook
        working-directory: ${{ github.workspace }}/playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DOCS_IMAGE_REF: ${{ needs.build.outputs.service_image_ref }}
          DOCS_PULL_IMAGE: "true"
          DOCS_KNOWLEDGE_REPO_PATH_HOST: ${{ needs.prep.outputs.knowledge_repo_path_host }}
          DOCS_RELOAD_INTERVAL: ${{ vars.DOCS_RELOAD_INTERVAL || '5m' }}
          DOCS_CANONICAL_DOMAIN: ${{ env.DEFAULT_DOCS_CANONICAL_DOMAIN }}
          DOCS_SERVED_DOMAINS: ${{ env.DEFAULT_DOCS_CANONICAL_DOMAIN }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          args=(
            ansible-playbook
            -i inventory.ini
            -e "docs_service_hosts=${{ needs.prep.outputs.target_host }}"
            -e "docs_service_sync_dns=${{ needs.prep.outputs.sync_dns }}"
          )

          if [[ "${{ needs.prep.outputs.run_apply }}" != "true" ]]; then
            args+=(-C)
          fi

          args+=(deploy_docs_svc_plus.yml)

          ANSIBLE_CONFIG="${PWD}/ansible.cfg" "${args[@]}"

  validate:
    name: Validate
    needs:
      - prep
      - deploy
    if: ${{ always() && needs.deploy.result == 'success' && needs.prep.outputs.run_apply == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out playbooks repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: x-evor/playbooks
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: playbooks

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.11"

      - name: Install Ansible runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core==2.18.3"

      - name: Prepare runner SSH access
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${SINGLE_NODE_VPS_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa"
          chmod 600 "${HOME}/.ssh/id_rsa"

      - name: Verify docs health endpoint on target host
        working-directory: ${{ github.workspace }}/playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          set -euo pipefail

          ANSIBLE_CONFIG="${PWD}/ansible.cfg" \
          ansible -i inventory.ini "${{ needs.prep.outputs.target_host }}" -b \
            -m ansible.builtin.shell \
            -a "curl -fsS http://127.0.0.1:18086/healthz"

      - name: Verify public docs endpoint on target host
        working-directory: ${{ github.workspace }}/playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          set -euo pipefail

          ANSIBLE_CONFIG="${PWD}/ansible.cfg" \
          ansible -i inventory.ini "${{ needs.prep.outputs.target_host }}" -b \
            -m ansible.builtin.shell \
            -a "curl -fsS http://127.0.0.1:18086/docs >/dev/null"
