services:
  docs-service:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KNOWLEDGE_REPO_PATH: /knowledge
      DOCS_SERVICE_PORT: 8084
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      DOCS_RELOAD_INTERVAL: ${DOCS_RELOAD_INTERVAL:-5m}
    volumes:
      - ${KNOWLEDGE_REPO_PATH_HOST:?set KNOWLEDGE_REPO_PATH_HOST}:/knowledge
    ports:
      - "8084:8084"
